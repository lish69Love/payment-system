<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 1200px;
            width: 100%;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn.active {
            background: rgba(255, 255, 255, 0.5);
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .timezone-name {
            font-size: 1.3em;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
        }

        .city-name {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
        }

        .digital-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .time {
            font-size: 2.5em;
            font-weight: bold;
            color: #4ade80;
        }

        .period {
            font-size: 1.2em;
            color: #fbbf24;
            margin-top: 5px;
        }

        .timezone-selector {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .timezone-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        .timezone-option {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        .timezone-option.selected {
            background: rgba(76, 222, 128, 0.3);
            border-color: #4ade80;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 Global Time Zone Clock</h1>
            <p>Real-time display across multiple time zones</p>
        </div>

        <div class="controls">
            <button class="btn active" onclick="setFormat('12h')">12 Hour</button>
            <button class="btn" onclick="setFormat('24h')">24 Hour</button>
            <button class="btn" onclick="resetToDefault()">Reset</button>
        </div>

        <div class="timezone-selector">
            <div style="color: white; margin-bottom: 15px;">Select Time Zones:</div>
            <div class="timezone-list" id="timezoneList"></div>
        </div>

        <div class="clocks-grid" id="clocksGrid"></div>
    </div>

    <script>
        const DEFAULT_TIMEZONES = [
            { name: 'New York', tz: 'America/New_York' },
            { name: 'London', tz: 'Europe/London' },
            { name: 'Tokyo', tz: 'Asia/Tokyo' },
            { name: 'Sydney', tz: 'Australia/Sydney' },
            { name: 'Dubai', tz: 'Asia/Dubai' },
            { name: 'Singapore', tz: 'Asia/Singapore' },
        ];

        const ALL_TIMEZONES = [
            { name: 'New York', tz: 'America/New_York' },
            { name: 'Los Angeles', tz: 'America/Los_Angeles' },
            { name: 'Chicago', tz: 'America/Chicago' },
            { name: 'London', tz: 'Europe/London' },
            { name: 'Paris', tz: 'Europe/Paris' },
            { name: 'Dubai', tz: 'Asia/Dubai' },
            { name: 'Tokyo', tz: 'Asia/Tokyo' },
            { name: 'Sydney', tz: 'Australia/Sydney' },
            { name: 'Auckland', tz: 'Pacific/Auckland' },
            { name: 'Honolulu', tz: 'Pacific/Honolulu' },
            { name: 'Toronto', tz: 'America/Toronto' },
            { name: 'Mexico City', tz: 'America/Mexico_City' },
            { name: 'Sao Paulo', tz: 'America/Sao_Paulo' },
            { name: 'Berlin', tz: 'Europe/Berlin' },
            { name: 'Mumbai', tz: 'Asia/Kolkata' },
            { name: 'Bangkok', tz: 'Asia/Bangkok' },
            { name: 'Singapore', tz: 'Asia/Singapore' },
            { name: 'Hong Kong', tz: 'Asia/Hong_Kong' },
            { name: 'Moscow', tz: 'Europe/Moscow' },
            { name: 'Istanbul', tz: 'Europe/Istanbul' },
        ];

        let selectedTimezones = [...DEFAULT_TIMEZONES];
        let timeFormat = '12h';

        function initializeTimezoneSelector() {
            const list = document.getElementById('timezoneList');
            list.innerHTML = ALL_TIMEZONES.map(tz => {
                const isSelected = selectedTimezones.some(s => s.tz === tz.tz);
                return `<button class="timezone-option ${isSelected ? 'selected' : ''}" onclick="toggleTimezone('${tz.tz}', '${tz.name}')">${tz.name}</button>`;
            }).join('');
        }

        function toggleTimezone(tz, name) {
            const index = selectedTimezones.findIndex(s => s.tz === tz);
            if (index > -1) {
                selectedTimezones.splice(index, 1);
            } else {
                selectedTimezones.push({ name, tz });
            }
            updateClocks();
            initializeTimezoneSelector();
        }

        function formatTime(date, format) {
            const hours = date.getHours();
            const minutes = date.getMinutes();
            const seconds = date.getSeconds();

            if (format === '24h') {
                return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            } else {
                const ampm = hours >= 12 ? 'PM' : 'AM';
                const displayHours = hours % 12 || 12;
                return {
                    time: `${String(displayHours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`,
                    period: ampm
                };
            }
        }

        function updateClocks() {
            const grid = document.getElementById('clocksGrid');
            grid.innerHTML = selectedTimezones.map(tz => {
                const date = new Date(new Date().toLocaleString('en-US', { timeZone: tz.tz }));
                const formatted = formatTime(date, timeFormat);

                const dayName = date.toLocaleDateString('en-US', { weekday: 'long', timeZone: tz.tz });
                const fullDate = date.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    timeZone: tz.tz
                });

                const timeDisplay = timeFormat === '24h' ? formatted : formatted.time;
                const periodHTML = timeFormat === '24h' ? '' : `<div class="period">${formatted.period}</div>`;

                return `
                    <div class="clock-card">
                        <div class="timezone-name">${tz.tz.split('/')[1]}</div>
                        <div class="city-name">${tz.name}</div>
                        <div class="digital-display">
                            <div class="time">${timeDisplay}</div>
                            ${periodHTML}
                        </div>
                        <div class="date-info">
                            <div>${dayName}</div>
                            <div>${fullDate}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setFormat(format) {
            timeFormat = format;
            document.querySelectorAll('.controls .btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateClocks();
        }

        function resetToDefault() {
            selectedTimezones = [...DEFAULT_TIMEZONES];
            timeFormat = '12h';
            document.querySelectorAll('.controls .btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.controls .btn')[0].classList.add('active');
            updateClocks();
            initializeTimezoneSelector();
        }

        initializeTimezoneSelector();
        updateClocks();
        setInterval(updateClocks, 1000);
    </script>
</body>
</html>
